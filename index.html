<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLEGROUND - 2 Teams</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

<!-- LOBBY -->
<div id="lobby-screen" class="screen active lobby-screen">
    <div class="lobby-bg">
        <div class="bg-grid"></div>
        <div class="lobby-glow"></div>
        <div class="lobby-glow blue"></div>
    </div>

    <!-- Las dos mitades de equipo solo cubren la parte superior -->
    <div class="lobby-layout">
        <div class="team-selection-container">
            <button id="select-red" class="team-half red-side" data-team="red">
                <div class="team-content">
                    <div class="team-icon-large">R</div>
                    <div class="team-name">ROJO</div>
                    <div class="team-desc">wacamole</div>
                </div>
            </button>
            <button id="select-blue" class="team-half blue-side" data-team="blue">
                <div class="team-content">
                    <div class="team-icon-large">A</div>
                    <div class="team-name">AZUL</div>
                    <div class="team-desc">Arroz</div>
                </div>
            </button>
        </div>

        <!-- Zona inferior: nombre + botón, completamente libre de otros elementos -->
        <div class="join-zone">
            <input id="name-input" class="name-input" type="text" maxlength="16"
                   placeholder="Tu nombre" autocomplete="off" spellcheck="false" />
            <button id="join-btn" class="join-button">
                <span class="join-text">ENTRAR AL CAMPO</span>
                <div class="join-arrow"></div>
            </button>
        </div>
    </div>
</div>

<!-- JUEGO -->
<div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>

    <div id="hud">
        <div id="hud-left">
            <div id="player-info">
                <div id="player-name-hud"></div>
                <div id="player-shape-hud"></div>
                <div id="player-team-hud"></div>
            </div>
            <div id="health-container">
                <div class="health-label">HP</div>
                <div class="health-bar-bg">
                    <div id="health-bar-fill"></div>
                    <div id="health-bar-text">100</div>
                </div>
            </div>
        </div>

        <div id="hud-center">
            <div id="score-board">
                <div class="score-team red-score-block">
                    <div class="score-label">ROJOS</div>
                    <div id="red-kills" class="score-count">0</div>
                    <div class="score-goal">/ 50</div>
                </div>
                <div class="score-separator"></div>
                <div class="score-team blue-score-block">
                    <div class="score-label">AZULES</div>
                    <div id="blue-kills" class="score-count">0</div>
                    <div class="score-goal">/ 50</div>
                </div>
            </div>
        </div>

        <div id="hud-right">
            <button id="toggle-board-btn" class="toggle-board-btn">☰ TOP 10</button>
        </div>
    </div>

    <!-- Leaderboard panel -->
    <div id="leaderboard-panel" class="hidden">
        <div class="lb-title">Top Kills</div>
        <table class="lb-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Jugador</th>
                    <th>Equipo</th>
                    <th>Kills</th>
                </tr>
            </thead>
            <tbody id="lb-body"></tbody>
        </table>
    </div>

    <div id="kill-feed"></div>

    <div id="death-overlay" class="hidden">
        <div id="death-message">
            <div class="death-title">ELIMINADO</div>
            <div class="death-by" id="death-by-text"></div>
            <div class="death-timer" id="death-timer-text">Reapareciendo en 3...</div>
        </div>
    </div>

    <div id="victory-overlay" class="hidden">
        <div id="victory-message">
            <div class="victory-title" id="victory-title">¡VICTORIA!</div>
            <div class="victory-sub" id="victory-sub"></div>
            <div class="victory-board" id="victory-board"></div>
            <div class="victory-timer" id="victory-timer">Reiniciando en 8...</div>
        </div>
    </div>

    <div id="crosshair"></div>
</div>

<script src="game.js"></script>
</body>
</html>
